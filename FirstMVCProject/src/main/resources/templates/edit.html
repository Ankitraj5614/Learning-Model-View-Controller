<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org" 
 th:replace="~{baseui::mybaseLayout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<section>
		<h1 style="align-items:'center';">
			Welcome to Register
		</h1>
	<div class="container mt-4">

    <div class="row">
        <div class="col-md-6 offset-3">

            <form th:action="@{/update}" method="post" th:object="${user}">
              <input 
                           th:field="*{id}"
                           class="form-control">
                           
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text"
                           id="name"
                           th:field="*{name}"
                           class="form-control">
                    <small class="form-text text-muted">
                        We'll never share your information with anyone else.
                    </small>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text"
                           id="address"
                           th:field="*{address}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label for="aadhar">Aadhar</label>
                    <input type="text"
                           id="aadhar"
                           th:field="*{aadhar}"
                           class="form-control">
                </div>

                <div class="form-group">
                    <label for="pan">PAN</label>
                    <input type="text"
                           id="pan"
                           th:field="*{pan}"
                           class="form-control">
                </div>

                <button type="submit" class="btn btn-primary">
                    Edit
                </button>
            </form>
        </div>
    </div>
</div>
	</section>
</body>
</html>
